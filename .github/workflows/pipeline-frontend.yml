name: RES Frontend Client Pipeline

on:
  push:
    branches:
      - develop
    paths:
      - frontend/**
      - docker/frontend/**
      - .github/workflows/*frontend*.yml

jobs:
  build-image:
    name: Build & Push Frontend Docker Image
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      VERSION: ${{ steps.extract_version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Détermine la config Angular selon la branche
      - name: Set build config
        id: set_build_config
        run: |
          echo "BUILD_CONFIG=dev-aws" >> $GITHUB_ENV

      # 📦 Récupérer la version depuis package.json
      - name: Extract version
        id: extract_version
        run: |
          cd frontend/client-app
          echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      # 🔐 AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 🐳 Build & push Docker
      - name: Build & Push Docker image
        run: |
          IMAGE_URI=701970276292.dkr.ecr.eu-north-1.amazonaws.com/restaurant-client-dev
          VERSION=${{ steps.extract_version.outputs.VERSION }}

          docker build \
            --build-arg BUILD_CONFIG=$BUILD_CONFIG \
            -t $IMAGE_URI:$VERSION \
            -t $IMAGE_URI:latest \
            -f docker/frontend/Dockerfile \
            .

          docker push $IMAGE_URI:$VERSION
          docker push $IMAGE_URI:latest

  deploy:
    name: Deploy Frontend on ECS
    runs-on: ubuntu-latest
    needs: build-image
    environment: dev

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition restaurant-client-task-dev \
            --query taskDefinition > task-definition.json

      - name: Update image
        run: |
          IMAGE_URI=701970276292.dkr.ecr.eu-north-1.amazonaws.com/restaurant-client-dev:${{ needs.build-image.outputs.VERSION }}

          jq --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
             task-definition.json > new-task-definition.json

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json

      - name: Deploy
        run: |
          aws ecs update-service \
            --cluster restaurant-cluster-dev \
            --service restaurant-client-dev \
            --task-definition restaurant-client-task-dev \
            --force-new-deployment
