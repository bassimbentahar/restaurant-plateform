spring:
  datasource:
    url: jdbc:postgresql://prod-db-url:5432/restaurant
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.portalcoffee.ch/realms/res-realm

app:
  cors:
    allowed-origins:
      - https://portalcoffee.ch
