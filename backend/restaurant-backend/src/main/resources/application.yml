spring:
  application:
    name: restaurant-backend

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

app:
  cors:
    allowed-origins: []

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: restaurant-backend
    version: ${APP_VERSION:unknown}
